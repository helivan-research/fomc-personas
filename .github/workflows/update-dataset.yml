name: Update HF dataset

# Weekly incremental refresh of the helivan/fomc-personas Hugging Face dataset: scrape each member's
# new public documents, extract + embed the new passages, and push the changed shards back to HF.
# Incremental, so a run with nothing new does (almost) no work and no push.
#
# Requires two repository secrets:
#   OPENAI_API_KEY  — chunk extraction (gpt-4o-mini) + embeddings (text-embedding-3-large)
#   HF_TOKEN        — write access to the helivan/fomc-personas dataset (also reads it for the pull)
#
# Optional, to auto-refresh the live federalreserve.ai site after the dataset updates (restarts the
# Railway service, which re-syncs the corpus from HF on boot):
#   RAILWAY_TOKEN       — a Railway *project* token (Railway → project → Settings → Tokens)
#   RAILWAY_SERVICE_ID  — the web service's ID (Railway → service → Settings, or from the URL)
# Both unset -> the redeploy step is skipped.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}    # allow manual runs

permissions:
  contents: read

concurrency:
  group: update-dataset
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install poppler-utils (pdftotext, for FOMC transcript PDFs)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser (BIS president-speech scraper)
        run: python -m playwright install --with-deps chromium

      - name: Scrape, extract, embed, and push to HF
        id: refresh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python data/scrape/build_dataset.py --all --pull --push

      # Restart the live site so it re-syncs the freshened corpus from HF on boot. The /cache volume
      # makes this incremental. Runs only when the dataset actually changed (new chunks were pushed),
      # and is skipped gracefully if the Railway secrets aren't configured.
      - name: Redeploy the live site (Railway)
        if: success() && steps.refresh.outputs.pushed == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skipping live-site redeploy."
            exit 0
          fi
          npm install -g @railway/cli
          railway redeploy --service "$RAILWAY_SERVICE_ID" --yes
